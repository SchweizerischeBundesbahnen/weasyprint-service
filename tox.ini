[tox]
isolated_build = True
envlist =
    lint
    py313

[testenv:lint]
description = run linters and formatters
deps =
    .[dev]
commands =
    ruff format
    ruff check
    mypy .

[testenv]
description = run pytest and coverage
deps =
    .[dev,test]
commands =
    coverage run -m pytest tests/ --junitxml="junittest.xml" -v
    coverage report -m --fail-under 90
    coverage xml

[coverage:run]
relative_files = True
source = app/
branch = True
