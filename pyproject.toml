[project]
name = "weasyprint-service"
version = "0.0.0"  # the version is controlled by the pipeline
description = "Service for https://github.com/Kozea/WeasyPrint"
authors = [
    {name = "SBB Polarion Team", email = "polarion-opensource@sbb.ch"},
]
license = {text = "Apache-2.0"}
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "weasyprint==66.0",
    "defusedxml==0.7.1",
    "fastapi==0.116.2",
    "uvicorn==0.35.0",
    "requests==2.32.5",
    "starlette>=0.47.2",
    "python-multipart>=0.0.20",
    "beautifulsoup4>=4.13.5",
    "html5lib>=1.1",
]

[project.optional-dependencies]
dev = [
    "pre-commit==4.3.0",
    "ruff==0.13.1",
    "mypy==1.18.2",
    "types-defusedxml==0.7.0.20250822",
]
test = [
    "tox==4.30.2",
    "docker==7.1.0",
    "pytest==8.4.2",
    "pymupdf==1.26.4",
    "pypdf==6.0.0",
    "httpx==0.28.1",
    "coverage==7.10.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 240
fix = true
show-fixes = true
exclude = [
    "tests/*"  # Exclude all test files from linting
]

[tool.ruff.lint]
extend-select = [
    # --- Recommended ---
    "E", "W", # pycodestyle errors and warnings
    "F",      # Pyflakes
    "I",      # isort
    "C4",     # flake8-comprehensions
    "C90",    # mccabe
    "B",      # flake8-bugbear
    "UP",     # pyupgrade
    "S",      # flake8-bandit
    "PL",     # Pylint
    "PTH",    # flake8-pathlib
    "TCH",    # type-checking imports
    "SIM",    # flake8-simplify
    "T20",    # flake8-print
    "ERA",    # eradicate
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = [
    "S101", # No assert rule (bandit)
    "PLR2004", # No magic values (pylint)
    "F405", # undefined-local-with-import-star-usage (pyflakes)
    "F403", # No import * (pyflakes)
]

[tool.ruff.format]
line-ending = "lf"

[tool.ruff.lint.pylint]
max-args = 7

[tool.mypy]
explicit_package_bases = true
disallow_untyped_defs = true
exclude = "tests/.*"
install_types = true
non_interactive = true
